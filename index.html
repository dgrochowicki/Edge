<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edge — Terminal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <link rel="stylesheet" href="dashboard/styles.css">
</head>
<body>

<div class="app-shell">
<div id="sidebar-mount"></div>
<script src="dashboard/sidebar.js"></script>
<script>renderSidebar('dashboard');</script>
<div class="main">

<div class="container">
    <header>
        <div class="eyebrow">
            <span>EDGE / ESPORTS RESEARCH TERMINAL / v0.1</span>
        </div>
        <h1>Edge</h1>
        <p class="tagline">Performance tracking — CS2 · LoL · Dota 2</p>
    </header>

    <div class="kpi-row" id="kpiRow"></div>

    <div class="charts">
        <div class="panel">
            <div class="panel-title"><span>Cumulative P&amp;L</span><span id="plMeta"></span></div>
            <div class="pnl-toggle-row">
                <div class="report-tabs tight" id="pnlSourceToggle">
                    <span class="report-tab active" data-src="all" onclick="setPnlSource('all')">All</span>
                    <span class="report-tab" data-src="real" onclick="setPnlSource('real')">Real</span>
                    <span class="report-tab" data-src="rec" onclick="setPnlSource('rec')">Recommended</span>
                </div>
                <span class="pnl-source-caption" id="pnlSourceCaption"></span>
            </div>
            <div class="chart-box" id="pnlChartBox"><canvas id="roiChart"></canvas></div>
            <div class="calib-note" id="pnlNote" style="display:none;"></div>
        </div>
        <div class="panel">
            <div class="panel-title"><span>Outcome Split</span></div>
            <div class="outcome-bar" id="outcomeBar"></div>
            <div class="outcome-legend" id="outcomeLegend"></div>
        </div>
    </div>

    <div class="section">
        <div class="section-head">
            <h2>Bet Source</h2>
            <span class="count" id="sourceCount"></span>
        </div>
        <div id="sourceBody"></div>
    </div>

    <div class="section">
        <div class="section-head no-line">
            <h2>Selections Performance</h2>
            <span class="count" id="selCount"></span>
        </div>
        <div id="selBody"></div>
    </div>
</div>

</div>
</div>

<script src="dashboard/data.js"></script>
<script src="dashboard/shared-metrics.js"></script>
<script src="dashboard/dashboard.js"></script>
</body>
</html>
