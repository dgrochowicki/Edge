<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edge — Terminal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="dashboard/styles.css">
</head>
<body>

<div class="app-shell">
<div id="sidebar-mount"></div>
<script src="dashboard/sidebar.js"></script>
<script>renderSidebar('dashboard');</script>
<div class="main">

<div class="container">
    <header>
        <div class="eyebrow">
            <span>EDGE / ESPORTS RESEARCH TERMINAL / v0.1</span>
        </div>
        <h1>Edge</h1>
        <p class="tagline">Performance tracking — CS2 · LoL · Dota 2</p>
    </header>

    <div class="kpi-row" id="kpiRow"></div>
    <div class="kpi-row" id="kpiRow2"></div>

    <div class="charts">
        <div class="panel">
            <div class="panel-title"><span>Cumulative P&amp;L</span><span id="plMeta"></span></div>
            <div class="chart-box"><canvas id="roiChart"></canvas></div>
        </div>
        <div class="panel">
            <div class="panel-title"><span>Outcome Split</span></div>
            <div class="outcome-bar" id="outcomeBar"></div>
            <div class="outcome-legend" id="outcomeLegend"></div>
        </div>
    </div>

    <div class="section">
        <div class="section-head">
            <h2>Selections Performance</h2>
            <span class="count" id="selCount"></span>
        </div>
        <div id="selBody"></div>
    </div>

    <div class="section">
        <div class="section-head">
            <h2>Discipline Monitor</h2>
            <span class="count" id="disciplineCount"></span>
        </div>
        <div id="disciplineBody"></div>
    </div>

    <div class="section">
        <div class="section-head">
            <h2>By Game</h2>
        </div>
        <div id="byGameBody"></div>
    </div>

    <div class="section">
        <div class="section-head no-line click" id="calibHead" onclick="toggleCalibrationLab()">
            <h2>Calibration Lab</h2>
            <span class="count" id="calibCount"></span>
        </div>
        <div id="calibCompact"></div>
        <div id="calibBody"></div>
    </div>

    <div class="section">
        <div class="section-head">
            <h2>Recent Coupons</h2>
            <span class="count" id="couponCount"></span>
        </div>
        <table id="betsTable">
            <thead>
                <tr>
                    <th>ID</th><th>Date</th><th>Stake</th><th>Odds</th><th>Return</th><th>Status</th><th>ROI</th><th></th>
                </tr>
            </thead>
            <tbody id="tableBody"><!-- Filled by JS --></tbody>
        </table>
    </div>
</div>

</div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <div class="modal-head">
            <h2 id="modalTitle"></h2>
            <span class="close" id="closeModal">&times;</span>
        </div>
        <div class="modal-body" id="modalBody"></div>
    </div>
</div>

<script src="dashboard/data.js"></script>
<script src="dashboard/dashboard.js"></script>
</body>
</html>
