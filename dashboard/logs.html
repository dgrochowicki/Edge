<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edge — Logs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app-shell">
<div id="sidebar-mount"></div>
<script src="sidebar.js"></script>
<script>renderSidebar('logs');</script>
<div class="main">

<div class="container">
    <header>
        <div class="eyebrow">
            <span>EDGE / FULL COUPON LOG</span>
        </div>
        <h1>Logs</h1>
        <p class="tagline">Every coupon ever placed, newest first.</p>
    </header>

    <div class="kpi-row" id="logsSummaryRow"></div>

    <div class="section">
        <div class="section-head">
            <h2>All Coupons</h2>
            <span class="count" id="couponCount"></span>
        </div>
        <div class="report-tabs" id="sourceToggle" style="margin-bottom:14px;">
            <span class="report-tab active" data-src="all" onclick="setSource('all')">All</span>
            <span class="report-tab" data-src="real" onclick="setSource('real')">Real</span>
            <span class="report-tab" data-src="rec" onclick="setSource('rec')">Recommended</span>
        </div>
        <table id="betsTable">
            <thead>
                <tr>
                    <th>ID</th><th>Date</th><th>Type</th><th>Game</th><th>Source</th><th>Stake</th><th>Odds</th><th>Return</th><th>Status</th><th></th>
                </tr>
            </thead>
            <tbody id="tableBody"><!-- Filled by JS --></tbody>
        </table>
    </div>
</div>

</div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <div class="modal-head">
            <h2 id="modalTitle"></h2>
            <span class="close" id="closeModal">&times;</span>
        </div>
        <div class="modal-body" id="modalBody"></div>
    </div>
</div>

<script src="data.js"></script>
<script src="shared-metrics.js"></script>
<script src="logs.js"></script>
</body>
</html>
