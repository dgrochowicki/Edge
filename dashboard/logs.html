<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edge — Logs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">

<div class="app-shell">

    </a>
    <nav class="sidenav">
        <a href="../index.html" class="navlink" title="Dashboard" aria-label="Dashboard">
            <svg class="nav-icon" width="18" height="18" viewBox="0 0 16 17" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M15.5 15.5925L15.5 16.0925L0.5 16.0925L0.5 15.5925" stroke="currentColor"/>
                <path d="M15.5 13.5925L15.5 5.36176L8 0.59253L0.5 5.36176L0.5 13.5925" stroke="currentColor"/>
            </svg>
        </a>
        <a href="reports.html" class="navlink" title="Reports" aria-label="Reports">
            <svg class="nav-icon" width="18" height="18" viewBox="0 0 16 17" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M15.5 15.5L15.5 16L0.5 16L0.5 15.5" stroke="currentColor"/>
                <path d="M15.5 13.5001L15.5 4.5L11.5 0.500057L0.5 0.5L0.5 13.5001" stroke="currentColor"/>
            </svg>
        </a>
        <a href="logs.html" class="navlink active" title="Logs" aria-label="Logs">

                <path d="M16 16L0 16" stroke="currentColor"/>

            </svg>
        </a>
    </nav>
</aside>
<div class="main">

<div class="container">
    <header>
        <div class="eyebrow">
            <span>EDGE / FULL COUPON LOG</span>
        </div>
        <h1>Logs</h1>
        <p class="tagline">Every coupon ever placed, newest first.</p>
    </header>

    <div class="section">
        <div class="section-head">
            <h2>All Coupons</h2>
            <span class="count" id="couponCount"></span>
        </div>
        <table id="betsTable">
            <thead>
                <tr>
                    <th>ID</th><th>Date</th><th>Stake</th><th>Odds</th><th>Return</th><th>Status</th><th>ROI</th><th></th>
                </tr>
            </thead>
            <tbody id="tableBody"><!-- Filled by JS --></tbody>
        </table>
    </div>
</div>

</div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <div class="modal-head">
            <h2 id="modalTitle"></h2>
            <span class="close" id="closeModal">&times;</span>
        </div>
        <div class="modal-body" id="modalBody"></div>
    </div>
</div>

<script src="logs.js"></script>
</body>
</html>
