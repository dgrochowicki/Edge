<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edge — Research</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app-shell">
<div id="sidebar-mount"></div>
<script src="sidebar.js"></script>
<script>renderSidebar('research');</script>
<div class="main">

<div class="container">
    <header>
        <div class="eyebrow">
            <span>EDGE / METHOD &amp; CALIBRATION</span>
        </div>
        <h1>Research</h1>
        <p class="tagline">Does the method have an edge?</p>
    </header>

    <!-- TODO(agent-tabs): once gpt/claude both have enough per-agent volume,
         turn this into clickable tabs (same pattern as the reports view:
         list + tabs, compared sequentially, not side by side). -->
    <div class="calib-note" style="margin-bottom:20px;">Comparing gpt vs claude — coming once each agent has enough settled predictions on its own.</div>

    <div class="section hero">
        <div class="section-head no-line click" id="calibHead" onclick="toggleCalibrationLab()">
            <h2>Calibration Lab</h2>
            <span class="count"><span id="calibCount"></span> <span class="calib-compact-arrow" id="calibArrow">+</span></span>
        </div>
        <div id="calibCompact"></div>
        <div id="calibBody"></div>
    </div>

    <div class="section">
        <div class="section-head">
            <h2>Discipline Monitor</h2>
            <span class="count" id="disciplineCount"></span>
        </div>
        <div id="disciplineBody"></div>
    </div>

    <div class="section">
        <div class="section-head no-line click" onclick="calibInfo('byGame')">
            <h2>By Game</h2>
        </div>
        <div id="byGameBody"></div>
    </div>
</div>

</div>
</div>

<script src="data.js"></script>
<script src="shared-metrics.js"></script>
<script src="research.js"></script>
</body>
</html>
